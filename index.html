<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brandler — Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f6f2ea;
      --surface: rgba(255,255,255,0.55);
      --surface-strong: rgba(255,255,255,0.72);
      --text: #173d2c;
      --text-dark: #13271f;
      --text-soft: #5f665f;
      --green: #1f6f4a;
      --green-2: #2e8a61;
      --border: rgba(23, 61, 44, 0.10);
      --shadow: 0 20px 60px rgba(20, 30, 24, 0.08);
      --shadow-soft: 0 10px 30px rgba(20, 30, 24, 0.05);
      --purple: #d9c8ff;
      --mint: #c9f1dc;
      --peach: #ffdcb6;
      --pink: #ffc6e7;
      --blue: #bfe6ff;
      --yellow: #ffe2a8;
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 999px;
      --max: 1240px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(191,230,255,0.24), transparent 22%),
        radial-gradient(circle at 78% 14%, rgba(255,198,231,0.20), transparent 22%),
        radial-gradient(circle at 62% 52%, rgba(201,241,220,0.18), transparent 24%),
        linear-gradient(180deg, #faf8f4 0%, var(--bg) 100%);
      color: var(--text-dark);
    }

    img {
      max-width: 100%;
      display: block;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(calc(100% - 48px), var(--max));
      margin: 0 auto;
    }

    .eyebrow {
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 22px;
    }

    .section-heading {
      max-width: 760px;
      margin: 0 auto 56px;
      text-align: center;
    }

    .section-heading h2 {
      margin: 0 0 16px;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.7rem, 6vw, 4.75rem);
      line-height: 0.95;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .section-heading h2 em {
      display: block;
      font-style: italic;
      color: var(--green);
      margin-top: -6px;
    }

    .section-heading p {
      margin: 0;
      font-size: 1.15rem;
      line-height: 1.7;
      color: var(--text-soft);
    }

    .soft-rule {
      width: 120px;
      height: 1px;
      margin: 16px auto 26px;
      background: linear-gradient(90deg, transparent, rgba(23,61,44,0.15), transparent);
    }

    /* Header */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: rgba(250,248,244,0.72);
      border-bottom: 1px solid rgba(23,61,44,0.06);
    }

    .nav-shell {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 24px;
      min-height: 88px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 14px;
      font-weight: 800;
      letter-spacing: 0.08em;
      color: var(--green);
      font-size: 1.15rem;
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(31,111,74,0.14);
      background: linear-gradient(135deg, rgba(201,241,220,0.7), rgba(255,255,255,0.5));
      box-shadow: var(--shadow-soft);
      font-weight: 800;
      font-size: 1.8rem;
      font-family: "Inter", sans-serif;
    }

    .nav-links {
      display: flex;
      justify-content: center;
      gap: 36px;
      flex-wrap: wrap;
    }

    .nav-links a {
      color: var(--text);
      font-size: 1rem;
      font-weight: 500;
      transition: color 0.22s ease, transform 0.22s ease;
    }

    .nav-links a:hover {
      color: var(--green-2);
      transform: translateY(-1px);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 54px;
      padding: 0 24px;
      border-radius: var(--radius-sm);
      font-weight: 600;
      font-size: 1rem;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, border-color 0.25s ease;
      cursor: pointer;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, #1d6b47, #155136);
      box-shadow:
        0 10px 24px rgba(31,111,74,0.16),
        0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .btn-primary:hover {
      box-shadow:
        0 16px 34px rgba(31,111,74,0.24),
        0 0 0 1px rgba(255,255,255,0.08) inset;
    }

    .btn-outline {
      color: var(--green);
      border: 1.5px solid rgba(31,111,74,0.45);
      background: rgba(255,255,255,0.25);
    }

    .btn-gradient {
      color: white;
      background: linear-gradient(90deg, #66e0cf 0%, #4bb1ff 48%, #b06cff 100%);
      box-shadow: 0 14px 30px rgba(129, 164, 255, 0.22);
    }

    .btn-gradient:hover {
      box-shadow: 0 18px 42px rgba(129, 164, 255, 0.30);
    }

    /* Hero */
    .hero {
      padding: 42px 0 72px;
      overflow: hidden;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 48px;
      align-items: center;
      min-height: 760px;
    }

    .hero-copy {
      padding: 40px 0;
      position: relative;
      z-index: 2;
    }

    .hero-tag {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--green);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      margin-bottom: 16px;
    }

    .hero-squiggle {
      width: 160px;
      height: 12px;
      margin-bottom: 28px;
      background:
        radial-gradient(circle at 8px 6px, #ffd18f 0 7px, transparent 7px),
        radial-gradient(circle at 40px 6px, #ffb0cf 0 7px, transparent 7px),
        radial-gradient(circle at 72px 6px, #cdb7ff 0 7px, transparent 7px),
        radial-gradient(circle at 104px 6px, #8de2d1 0 7px, transparent 7px);
      filter: blur(2px);
      opacity: 0.95;
    }

    .hero h1 {
      margin: 0 0 24px;
      font-family: "Inter", sans-serif;
      font-size: clamp(3.2rem, 7vw, 6.1rem);
      line-height: 0.94;
      letter-spacing: -0.05em;
      color: var(--green);
      font-weight: 800;
    }

    .hero h1 em {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 500;
    }

    .hero p {
      margin: 0 0 30px;
      font-size: 1.35rem;
      line-height: 1.72;
      color: var(--text-soft);
      max-width: 640px;
    }

    .hero-actions {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 48px;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      max-width: 700px;
    }

    .hero-stat {
      padding: 0 8px 0 0;
      border-right: 1px solid rgba(23,61,44,0.12);
    }

    .hero-stat:last-child { border-right: none; }

    .hero-stat strong {
      display: block;
      font-size: clamp(2rem, 3vw, 3rem);
      letter-spacing: -0.04em;
      color: var(--green);
      margin-bottom: 8px;
    }

    .hero-stat span {
      color: var(--text-soft);
      font-size: 1.02rem;
      line-height: 1.4;
    }

    .hero-visual {
      position: relative;
      min-height: 720px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-glow {
      position: absolute;
      inset: 10% 0 0 5%;
      background:
        radial-gradient(circle at 48% 44%, rgba(199,184,255,0.42), transparent 28%),
        radial-gradient(circle at 58% 56%, rgba(166,231,211,0.34), transparent 25%),
        radial-gradient(circle at 82% 58%, rgba(255,214,165,0.30), transparent 22%),
        radial-gradient(circle at 72% 28%, rgba(255,198,231,0.22), transparent 18%);
      filter: blur(34px);
      pointer-events: none;
    }

    .float-card {
      position: absolute;
      border-radius: 28px;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(23,61,44,0.08);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
      transition: transform 0.35s ease;
    }

    .float-card:hover { transform: translateY(-4px) rotate(0deg); }

    .float-top {
      top: 70px;
      right: 30px;
      width: 430px;
      padding: 26px 28px;
      transform: rotate(-7deg);
      background: linear-gradient(135deg, rgba(224,214,255,0.72), rgba(255,255,255,0.55));
    }

    .float-mid {
      top: 250px;
      left: 20px;
      width: 510px;
      padding: 22px 22px 18px;
      transform: rotate(7deg);
      background: linear-gradient(135deg, rgba(199,241,220,0.74), rgba(255,255,255,0.58));
    }

    .float-bottom {
      right: 12px;
      bottom: 56px;
      width: 430px;
      padding: 22px 22px 18px;
      transform: rotate(-4deg);
      background: linear-gradient(135deg, rgba(255,231,185,0.82), rgba(255,255,255,0.58));
    }

    .mini-row {
      display: flex;
      gap: 18px;
      align-items: center;
    }

    .mini-icon {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(23,61,44,0.08);
      display: grid;
      place-items: center;
      font-size: 1.8rem;
      box-shadow: var(--shadow-soft);
      flex: 0 0 auto;
    }

    .mini-copy h4 {
      margin: 0 0 6px;
      font-size: 1.45rem;
      color: var(--text);
    }

    .mini-copy p {
      margin: 0;
      font-size: 1rem;
      color: var(--text-soft);
      line-height: 1.55;
    }

    .chip-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    .chip {
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 0.92rem;
      color: var(--green);
      background: rgba(255,255,255,0.48);
      border: 1px solid rgba(23,61,44,0.08);
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .dashboard-box {
      background: rgba(255,255,255,0.6);
      border: 1px solid rgba(23,61,44,0.08);
      border-radius: 18px;
      padding: 18px 16px;
    }

    .dashboard-box small {
      color: var(--text-soft);
      display: block;
      margin-bottom: 8px;
      font-size: 0.84rem;
    }

    .dashboard-box strong {
      font-size: 2rem;
      display: block;
      color: var(--green);
      letter-spacing: -0.04em;
    }

    .dashboard-box span {
      color: var(--green-2);
      font-size: 0.84rem;
      font-weight: 600;
    }

    .chart {
      height: 116px;
      border-radius: 18px;
      padding: 12px 12px 0;
      background: rgba(255,255,255,0.58);
      border: 1px solid rgba(23,61,44,0.08);
      overflow: hidden;
    }

    .chart svg {
      width: 100%;
      height: 100%;
    }

    .chart path.line {
      fill: none;
      stroke: var(--green);
      stroke-width: 3.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart path.area {
      fill: url(#areaGradient);
      opacity: 0.4;
    }

    .doodle {
      position: absolute;
      font-size: 3rem;
      opacity: 0.8;
      filter: drop-shadow(0 8px 18px rgba(255,255,255,0.45));
      pointer-events: none;
    }

    .doodle.eye { left: 8px; top: 380px; color: #6c64ff; }
    .doodle.spark { right: -20px; top: 344px; color: #ffaf5a; }
    .doodle.arrow-top { right: 270px; top: 180px; color: #8b6fff; font-size: 3.6rem; }
    .doodle.arrow-bottom { left: 140px; bottom: 120px; color: #ffb55d; font-size: 3.1rem; }

    /* Value cards */
    .section {
      padding: 96px 0;
      position: relative;
    }

    .value-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 26px;
    }

    .value-card {
      position: relative;
      padding: 28px;
      border-radius: var(--radius-xl);
      border: 1px solid rgba(23,61,44,0.08);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      transition: transform 0.28s ease, box-shadow 0.28s ease;
    }

    .value-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow);
    }

    .value-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.45), transparent 30%);
      pointer-events: none;
    }

    .value-purple { background: linear-gradient(180deg, rgba(223,206,255,0.72), rgba(240,234,255,0.9)); }
    .value-mint { background: linear-gradient(180deg, rgba(211,247,219,0.82), rgba(235,249,236,0.94)); }
    .value-yellow { background: linear-gradient(180deg, rgba(255,228,170,0.84), rgba(255,241,208,0.95)); }

    .value-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .value-number {
      font-family: "Cormorant Garamond", serif;
      font-size: 4rem;
      line-height: 0.9;
      letter-spacing: -0.04em;
      opacity: 0.82;
    }

    .value-icon {
      font-size: 2.2rem;
      opacity: 0.88;
    }

    .value-card h3 {
      margin: 0 0 8px;
      font-size: 2rem;
      letter-spacing: -0.03em;
      color: var(--text);
      position: relative;
      z-index: 1;
    }

    .value-card .sub {
      margin: 0 0 20px;
      font-size: 1.18rem;
      color: var(--text);
      opacity: 0.9;
      position: relative;
      z-index: 1;
    }

    .value-media {
      margin-bottom: 20px;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid rgba(23,61,44,0.08);
      background: rgba(255,255,255,0.45);
      box-shadow: var(--shadow-soft);
      position: relative;
      z-index: 1;
      aspect-ratio: 1.35 / 1;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .mock-note,
    .mock-report,
    .mock-dashboard {
      width: 100%;
      height: 100%;
      border-radius: 18px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(23,61,44,0.09);
      padding: 18px;
    }

    .mock-note h5,
    .mock-report h5,
    .mock-dashboard h5 {
      margin: 0 0 10px;
      font-size: 1.15rem;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .mock-line {
      height: 10px;
      border-radius: 999px;
      background: rgba(23,61,44,0.08);
      margin-bottom: 10px;
    }

    .mock-line.short { width: 54%; }
    .mock-line.med { width: 72%; }
    .mock-line.long { width: 92%; }

    .note-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .note-box,
    .report-box,
    .dash-chip {
      border-radius: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(23,61,44,0.08);
      font-size: 0.84rem;
      color: var(--text-soft);
    }

    .mock-dashboard .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .mock-dashboard .stats .report-box strong {
      display: block;
      color: var(--green);
      font-size: 1.1rem;
      margin-bottom: 4px;
    }

    .mock-chart {
      margin-top: 10px;
      height: 80px;
      border-radius: 14px;
      background: rgba(255,255,255,0.74);
      border: 1px solid rgba(23,61,44,0.08);
      overflow: hidden;
    }

    .mock-chart svg {
      width: 100%;
      height: 100%;
    }

    .mock-report .cover {
      border-radius: 16px;
      border: 1px solid rgba(23,61,44,0.08);
      background: rgba(255,255,255,0.8);
      padding: 20px;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .mock-report .cover strong {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.8rem;
      color: var(--text);
      line-height: 1;
    }

    .value-card p.body {
      margin: 0 0 22px;
      font-size: 1.12rem;
      line-height: 1.72;
      color: var(--text-soft);
      position: relative;
      z-index: 1;
    }

    .value-card .btn {
      width: 100%;
      justify-content: center;
      position: relative;
      z-index: 1;
    }

    /* Smarter content */
    .split-grid {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 44px;
      align-items: center;
    }

    .text-block h2 {
      margin: 0 0 18px;
      color: var(--green);
      font-size: clamp(2.8rem, 5vw, 4.8rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-weight: 800;
    }

    .text-block h2 em {
      font-family: "Cormorant Garamond", serif;
      font-style: italic;
      font-weight: 500;
    }

    .text-block p {
      margin: 0 0 24px;
      color: var(--text-soft);
      font-size: 1.28rem;
      line-height: 1.72;
      max-width: 680px;
    }

    .pill-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin: 28px 0 32px;
    }

    .soft-pill {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 18px;
      border-radius: 999px;
      font-size: 1rem;
      color: var(--text);
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(23,61,44,0.08);
      box-shadow: var(--shadow-soft);
    }

    .soft-pill.purple { background: linear-gradient(90deg, rgba(223,206,255,0.72), rgba(255,255,255,0.55)); }
    .soft-pill.mint { background: linear-gradient(90deg, rgba(211,247,219,0.82), rgba(255,255,255,0.55)); }
    .soft-pill.peach { background: linear-gradient(90deg, rgba(255,228,170,0.86), rgba(255,255,255,0.55)); }

    .phone-shell {
      justify-self: center;
      width: min(420px, 92%);
      aspect-ratio: 0.58;
      border-radius: 44px;
      background: #1c1c1c;
      padding: 16px;
      box-shadow: 0 24px 70px rgba(20,30,24,0.18);
      transform: rotate(6deg);
      position: relative;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 34px;
      overflow: hidden;
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(247,246,243,0.96));
      padding: 22px;
      position: relative;
    }

    .notch {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 34%;
      height: 28px;
      border-radius: 0 0 18px 18px;
      background: #1b1b1b;
      z-index: 2;
    }

    .screen-header {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 18px;
    }

    .search {
      height: 48px;
      border-radius: 999px;
      background: rgba(23,61,44,0.05);
      border: 1px solid rgba(23,61,44,0.08);
      display: flex;
      align-items: center;
      padding: 0 18px;
      color: #8b928b;
      margin-bottom: 18px;
    }

    .screen-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .screen-stat {
      background: linear-gradient(180deg, rgba(211,247,219,0.56), rgba(255,255,255,0.65));
      border: 1px solid rgba(23,61,44,0.08);
      border-radius: 18px;
      padding: 14px 12px;
    }

    .screen-stat small {
      display: block;
      margin-bottom: 6px;
      color: var(--text-soft);
      font-size: 0.78rem;
    }

    .screen-stat strong {
      display: block;
      font-size: 1.65rem;
      letter-spacing: -0.04em;
      color: var(--green);
      margin-bottom: 4px;
    }

    .screen-chart {
      height: 140px;
      border-radius: 18px;
      background: rgba(255,255,255,0.8);
      border: 1px solid rgba(23,61,44,0.08);
      overflow: hidden;
      padding: 12px;
      margin-bottom: 16px;
    }

    .screen-list {
      display: grid;
      gap: 12px;
    }

    .screen-item {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 12px;
